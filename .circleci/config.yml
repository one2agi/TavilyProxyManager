version: 2.1

# ----------------------------------------------------------------------------
# TavilyProxyManager — CircleCI Pipeline (minimal: Docker only)
#
# 功能：
#   1. 前端构建 (npm run build)
#   2. 多架构 Docker 镜像构建 + 推送到 GHCR
#
# 触发时机：
#   - push 到 main / PR  → 构建并推 :latest 镜像
#   - 打 v* tag          → 构建并推 :latest + :<tag> 镜像
#
# 🔑  必需 Context：
#   CircleCI → Organization Settings → Contexts
#   创建 Context "ghcr-push"，添加环境变量 GHCR_TOKEN
#   （GitHub PAT，需 write:packages 权限）
# ----------------------------------------------------------------------------

workflows:
  version: 2
  build:
    jobs:
      - build-web
      - build-docker:
          requires: [build-web]
          context: ghcr-push
          filters:
            branches:
              ignore: [gh-pages]

# ----------------------------------------------------------------------------
# Job 1: 构建前端
# ----------------------------------------------------------------------------
jobs:
  build-web:
    docker:
      - image: cimg/node:20.10
    steps:
      - checkout
      - restore_cache:
          key: v1-deps-{{ checksum "web/package-lock.json" }}
          paths:
            - web/node_modules
      - run:
          name: Install dependencies
          command: npm ci
          working_directory: web
      - save_cache:
          key: v1-deps-{{ checksum "web/package-lock.json" }}
          paths:
            - web/node_modules
      - run:
          name: Build frontend
          command: npm run build
          working_directory: web
      - persist_to_workspace:
          root: .
          paths:
            - web/dist

# ----------------------------------------------------------------------------
# Job 2: 构建多架构 Docker 镜像并推送 GHCR
# ----------------------------------------------------------------------------
  build-docker:
    docker:
      - image: cimg/base:stable
    resource_class: medium
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup_remote_docker:
          version: 20.10.24
          docker_layer_caching: true
      - run:
          name: Show Docker info
          command: docker --version && docker buildx version
      - run:
          name: Login to GHCR
          command: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u one2agi --password-stdin
      - run:
          name: Create buildx builder
          command: |
            docker buildx create --name multiarch --driver docker-container --use || true
            docker buildx inspect --bootstrap
      - run:
          name: Build and push multi-arch image
          command: |
            IMAGE="ghcr.io/one2agi/tavilyproxymanager"
            TAGS="-t ${IMAGE}:latest"
            if [ -n "${CIRCLE_TAG}" ]; then
              TAGS="${TAGS} -t ${IMAGE}:${CIRCLE_TAG}"
            fi
            TAGS="${TAGS} -t ${IMAGE}:${CIRCLE_SHA1:0:7}"
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --build-arg BUILDKIT_INLINE_CACHE=1 \
              ${TAGS} \
              --push \
              .